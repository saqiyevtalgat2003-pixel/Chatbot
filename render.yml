services:
  - type: web
    name: chatbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: RANDOM_REPLY_CHANCE
        value: "0.05"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
